<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Anniversary">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/app-icon.png">
    <link rel="icon" type="image/png" sizes="180x180" href="./assets/app-icon.png">
    <link rel="icon" type="image/svg+xml" href="./assets/app-icon.svg">
    <title>Happy Anniversary, Kristin</title>
    <style>
        :root {
            --bg-1: #fff8fb;
            --bg-2: #ffe7ee;
            --card: rgba(255, 255, 255, 0.88);
            --card-border: rgba(255, 255, 255, 0.65);
            --text: #402433;
            --muted: #7b5567;
            --accent: #ff4f7b;
            --accent-dark: #e23867;
            --accent-soft: #ffd7e3;
            --shadow: 0 20px 50px rgba(206, 63, 112, 0.18);
            --success: #dff7e8;
            --success-text: #166534;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            min-height: 100%;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(255,255,255,0.95), transparent 35%),
                linear-gradient(145deg, var(--bg-1), var(--bg-2));
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            text-align: center;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: auto;
            width: 280px;
            height: 280px;
            border-radius: 999px;
            filter: blur(20px);
            opacity: 0.55;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            top: -60px;
            right: -30px;
            background: rgba(255, 144, 177, 0.45);
        }

        body::after {
            bottom: -80px;
            left: -20px;
            background: rgba(255, 191, 210, 0.55);
        }

        .floating-hearts {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .heart {
            position: absolute;
            bottom: -40px;
            color: rgba(255, 79, 123, 0.18);
            font-size: clamp(16px, 2vw, 28px);
            animation: drift linear infinite;
        }

        @keyframes drift {
            from {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            to {
                transform: translateY(-115vh) translateX(35px) rotate(18deg);
                opacity: 0;
            }
        }

        .shell {
            width: 100%;
            max-width: 520px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(14px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            box-shadow: var(--shadow);
            padding: 28px 24px 26px;
            min-height: 530px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.45), transparent 55%);
            pointer-events: none;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            align-self: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.76);
            border: 1px solid rgba(255, 79, 123, 0.15);
            color: var(--muted);
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 0.78rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-weight: 700;
        }

        .progress-wrap {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--muted);
            font-weight: 600;
        }

        .progress {
            height: 10px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 999px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
        }

        .progress-bar {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #ff7aa2, var(--accent));
            border-radius: inherit;
            transition: width 0.35s ease;
        }

        .hero {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .hero-photo-wrap {
            display: flex;
            justify-content: center;
        }

        .hero-photo {
            width: min(100%, 300px);
            padding: 12px;
            border-radius: 28px;
            background: rgba(255,255,255,0.76);
            border: 1px solid rgba(255, 79, 123, 0.12);
            box-shadow: 0 18px 34px rgba(206, 63, 112, 0.16);
        }

        .hero-photo img {
            width: 100%;
            display: block;
            border-radius: 20px;
        }

        .hero-photo-caption {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 2.9rem);
            line-height: 1.1;
            letter-spacing: -0.03em;
        }

        .subtitle {
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.6;
            max-width: 40ch;
            margin: 0 auto;
        }

        .question-card {
            background: rgba(255,255,255,0.72);
            border: 1px solid rgba(255, 79, 123, 0.1);
            border-radius: 22px;
            padding: 22px 18px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
            min-height: 190px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 16px;
            position: relative;
        }

        .question-badge {
            font-size: 0.82rem;
            color: var(--accent-dark);
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .question-text {
            font-size: clamp(1.35rem, 4vw, 1.8rem);
            font-weight: 800;
            line-height: 1.35;
        }

        .helper-text {
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .btn-container {
            display: flex;
            gap: 16px;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
            min-height: 104px;
            padding: 8px 0;
        }

        button {
            border: none;
            border-radius: 999px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, opacity 0.2s ease;
            font-weight: 800;
            letter-spacing: 0.01em;
            box-shadow: 0 12px 22px rgba(74, 26, 47, 0.12);
        }

        button:focus-visible {
            outline: 3px solid rgba(255, 79, 123, 0.28);
            outline-offset: 3px;
        }

        .btn-yes {
            background: linear-gradient(180deg, #ff6e93, var(--accent));
            color: white;
            padding: 15px 34px;
            font-size: 1rem;
            min-width: 118px;
            position: relative;
            z-index: 4;
        }

        .btn-yes:hover {
            transform: translateY(-1px) scale(1.02);
        }

        .btn-no {
            background: rgba(255,255,255,0.92);
            color: var(--muted);
            padding: 14px 28px;
            font-size: 1rem;
            min-width: 96px;
            z-index: 3;
        }

        .message-bar {
            min-height: 28px;
            color: var(--accent-dark);
            font-weight: 700;
            font-size: 0.95rem;
        }

        .btn-no.ghosted {
            opacity: 0.45;
            transform: scale(0.94);
        }

        .btn-yes.fake-disabled {
            opacity: 0.72;
            filter: saturate(0.8);
        }

        .footer-note {
            color: var(--muted);
            font-size: 0.84rem;
            line-height: 1.5;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-12px);
            background: rgba(64, 36, 51, 0.95);
            color: white;
            padding: 12px 18px;
            border-radius: 14px;
            font-weight: 700;
            box-shadow: 0 14px 28px rgba(0,0,0,0.15);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            z-index: 10;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .error-screen {
            width: min(720px, 100%);
            background: #151923;
            color: #eef2ff;
            border-radius: 28px;
            box-shadow: 0 24px 60px rgba(6, 8, 15, 0.45);
            padding: 30px 24px;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .error-screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(255,255,255,0.05), transparent 55%);
            pointer-events: none;
        }

        .terminal-top {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
        }

        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 999px;
        }

        .terminal-dot.red { background: #ff5f57; }
        .terminal-dot.yellow { background: #febc2e; }
        .terminal-dot.green { background: #28c840; }

        .error-label {
            color: #ff7a7a;
            font-weight: 800;
            font-size: 0.82rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .error-title {
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            color: white;
            margin-bottom: 14px;
        }

        .error-copy {
            color: #c7d2fe;
            line-height: 1.7;
            font-size: 1rem;
        }

        .error-highlight {
            display: inline-block;
            margin: 16px 0;
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(74, 222, 128, 0.12);
            color: #86efac;
            font-weight: 800;
        }

        .cta-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 22px;
            color: #fda4af;
            font-weight: 700;
            text-decoration: underline;
            cursor: pointer;
        }

        .final-card {
            background: rgba(255,255,255,0.92);
            border-radius: 30px;
            box-shadow: var(--shadow);
            padding: 32px 24px;
            max-width: 560px;
            display: grid;
            gap: 20px;
            text-align: center;
            position: relative;
            z-index: 2;
            animation: popIn 0.55s ease;
        }

        .final-photo-wrap {
            display: flex;
            justify-content: center;
        }

        .final-photo {
            width: min(100%, 320px);
            border-radius: 26px;
            background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,228,236,0.95));
            padding: 12px;
            box-shadow: 0 18px 34px rgba(206, 63, 112, 0.2);
            border: 1px solid rgba(255, 79, 123, 0.12);
        }

        .final-photo img {
            width: 100%;
            display: block;
            border-radius: 18px;
        }

        .photo-caption {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
        }

        .final-title {
            font-size: clamp(2.1rem, 5vw, 3rem);
            color: var(--accent-dark);
            line-height: 1.1;
        }

        .love-meter {
            background: linear-gradient(90deg, #ffe0ea, #ffd1e0);
            border-radius: 999px;
            padding: 5px;
        }

        .love-meter-fill {
            height: 14px;
            width: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #ff7aa2, #ff4f7b);
        }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }

        .memory-chip {
            background: rgba(255,255,255,0.8);
            border: 1px solid rgba(255, 79, 123, 0.12);
            border-radius: 18px;
            padding: 14px 10px;
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.35;
        }

        .signature {
            color: var(--text);
            font-weight: 700;
            line-height: 1.6;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: translateY(18px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 16px;
                align-items: flex-start;
            }

            .shell {
                max-width: none;
                display: block;
                padding-bottom: 28px;
            }

            .card {
                min-height: auto;
                border-radius: 24px;
                padding: 22px 18px 28px;
                justify-content: flex-start;
            }

            .btn-container {
                flex-direction: column;
                gap: 12px;
                min-height: 140px;
            }

            .btn-yes,
            .btn-no {
                width: 100%;
                max-width: 240px;
            }

            .memory-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation: none !important;
                transition: none !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <div class="floating-hearts" aria-hidden="true" id="hearts"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <main class="shell" id="app"></main>

    <script>
        const app = document.getElementById('app');
        const toast = document.getElementById('toast');
        const hearts = document.getElementById('hearts');

        const state = {
            currentPage: 0,
            yesScale: 1,
            clickAttempts: 0,
            isSwapped: false,
            totalPages: 6,
            promptsCleared: 0,
            chaosUnlocked: false,
            fakeAcceptCount: 0,
            toasts: [
                'Hmm. That answer looked suspicious. Retrying love verification...',
                'Rechecking emotional honesty, please hold 💘',
                'System note: true love confirmed, but we need one more tap.',
                'Tiny glitch. Huge feelings. Continuing...',
                'Romance sensors overloaded. Running another check...',
                'That looked correct, but the app is being dramatic about it.'
            ]
        };

        const pages = [
            {
                badge: 'Question 1 of 6',
                title: 'Kristin Egbert, are you still wildly, deeply, ridiculously in love with William Egbert?',
                helper: 'This is a very serious survey being run by a definitely professional romance department.',
                note: 'Tap carefully. The app may be emotionally invested.',
                yesLabel: 'Absolutely',
                noLabel: 'Not sure',
                setup: ({ yesBtn, setMessage, flashFakeAccept }) => {
                    const dodge = (event) => {
                        event.preventDefault();
                        state.clickAttempts += 1;
                        state.yesScale = Math.max(0.55, state.yesScale - 0.1);
                        const dx = Math.random() * 30 - 15;
                        const dy = Math.random() * 20 - 10;
                        yesBtn.style.transform = `scale(${state.yesScale}) translate(${dx}px, ${dy}px)`;
                        setMessage(state.clickAttempts > 2 ? 'Interesting hesitation. We’ll allow it.' : 'Button confidence drifting...');
                        if (state.clickAttempts >= 4) {
                            yesBtn.removeEventListener('pointerenter', dodge);
                            yesBtn.removeEventListener('touchstart', dodge);
                            setMessage('Fine. The button has accepted its fate.');
                        }
                    };
                    yesBtn.addEventListener('pointerenter', dodge);
                    yesBtn.addEventListener('touchstart', dodge, { passive: false });
                }
            },
            {
                badge: 'Question 2 of 6',
                title: 'Are you absolutely sure, with no take-backs, edits, or suspicious loopholes?',
                helper: 'A follow-up is required because the committee thinks your love might be too strong for a single checkbox.',
                note: 'The pink button is feeling shy.',
                yesLabel: 'Very sure',
                noLabel: 'Need loopholes',
                setup: ({ yesBtn, card, setMessage, flashFakeAccept }) => {
                    const teleport = (event) => {
                        event.preventDefault();
                        if (state.clickAttempts >= 12) {
                            yesBtn.removeEventListener('pointerdown', teleport);
                            yesBtn.removeEventListener('touchstart', teleport);
                            yesBtn.style.position = 'relative';
                            yesBtn.style.left = 'auto';
                            yesBtn.style.top = 'auto';
                            yesBtn.style.transform = 'none';
                            setMessage('Alright, alright. The button has stopped running.');
                            return;
                        }
                        state.clickAttempts += 1;
                        if (state.clickAttempts === 4 || state.clickAttempts === 8) {
                            flashFakeAccept('Accepted... almost. Love verification failed dramatically.');
                        }
                        const cardRect = card.getBoundingClientRect();
                        const maxX = Math.min(180, cardRect.width * 0.4);
                        const maxY = Math.min(150, cardRect.height * 0.28);
                        const x = Math.random() * maxX * 2 - maxX;
                        const y = Math.random() * maxY * 2 - maxY;
                        const rotate = Math.random() * 18 - 9;
                        const scale = 0.92 + Math.random() * 0.18;
                        yesBtn.style.position = 'absolute';
                        yesBtn.style.left = '50%';
                        yesBtn.style.top = '50%';
                        yesBtn.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) rotate(${rotate}deg) scale(${scale})`;
                        setMessage(state.clickAttempts > 5 ? 'The truth is evasive, but only temporarily.' : 'Please pursue the truth.');
                    };
                    yesBtn.addEventListener('pointerdown', teleport);
                    yesBtn.addEventListener('touchstart', teleport, { passive: false });
                }
            },
            {
                badge: 'Question 3 of 6',
                title: 'Do you love him even more today than yesterday?',
                helper: 'Careful. This one has a history of dramatic behavior.',
                note: 'If the buttons start trading places, remain calm.',
                yesLabel: 'Even more',
                noLabel: 'No comment',
                setup: ({ yesBtn, noBtn, setMessage, flashFakeAccept }) => {
                    const swap = (event) => {
                        event.preventDefault();
                        state.clickAttempts += 1;
                        state.isSwapped = !state.isSwapped;
                        const distance = state.isSwapped ? 118 : 0;
                        yesBtn.style.transform = state.isSwapped ? `translateX(${distance}px) rotate(6deg)` : 'translateX(0) rotate(0deg)';
                        noBtn.style.transform = state.isSwapped ? `translateX(-${distance}px) rotate(-6deg)` : 'translateX(0) rotate(0deg)';
                        yesBtn.textContent = state.isSwapped ? 'Catch me' : 'Even more';
                        if (state.clickAttempts === 5 || state.clickAttempts === 9) {
                            flashFakeAccept('Lock acquired... then immediately lost. Classic romance software.');
                        }
                        setMessage(state.isSwapped ? 'Those feelings have range.' : 'Love metrics destabilized again.');
                        if (state.clickAttempts >= 11) {
                            yesBtn.removeEventListener('pointerenter', swap);
                            yesBtn.removeEventListener('touchstart', swap);
                            yesBtn.textContent = 'Even more';
                            setMessage('The buttons are done being dramatic.');
                        }
                    };
                    yesBtn.addEventListener('pointerenter', swap);
                    yesBtn.addEventListener('touchstart', swap, { passive: false });
                }
            },
            {
                badge: 'Question 4 of 6',
                title: 'Final verification: was William the best choice your heart ever made?',
                helper: 'This answer may trigger permanent anniversary-level consequences.',
                note: 'Proceed only if you are prepared for romance-themed system instability.',
                yesLabel: 'Without question',
                noLabel: 'I plead the fifth',
                setup: ({ yesBtn, setMessage, flashFakeAccept }) => {
                    const pulseAway = (event) => {
                        event.preventDefault();
                        state.clickAttempts += 1;
                        const scale = state.clickAttempts % 2 === 0 ? 0.88 : 1.08;
                        const rotate = state.clickAttempts % 2 === 0 ? -5 : 5;
                        yesBtn.style.transform = `scale(${scale}) rotate(${rotate}deg)`;
                        if (state.clickAttempts === 3 || state.clickAttempts === 7) {
                            flashFakeAccept('Celebration mode unlocked... pending one extremely unnecessary extra check.');
                        }
                        setMessage(state.clickAttempts > 5 ? 'The answer is obvious, the app is just milking it.' : 'Warning: choosing correctly may unlock celebration mode.');
                        if (state.clickAttempts >= 10) {
                            yesBtn.removeEventListener('pointerenter', pulseAway);
                            yesBtn.removeEventListener('touchstart', pulseAway);
                            yesBtn.style.transform = 'none';
                            setMessage('Celebration mode can no longer be delayed.');
                        }
                    };
                    yesBtn.addEventListener('pointerenter', pulseAway);
                    yesBtn.addEventListener('touchstart', pulseAway, { passive: false });
                }

            },
            {
                badge: 'Question 5 of 6',
                title: 'If William stole the blankets tonight, would you still keep him anyway?',
                helper: 'This question is legally required by the Department of Married Life.',
                note: 'Blanket theft is not ideal, but neither is losing William.',
                yesLabel: 'Keep him',
                noLabel: 'File complaint',
                setup: ({ yesBtn, setMessage, flashFakeAccept }) => {
                    const tilt = (event) => {
                        event.preventDefault();
                        state.clickAttempts += 1;
                        const rotate = state.clickAttempts % 3 === 0 ? -10 : 10;
                        const shift = state.clickAttempts % 2 === 0 ? -26 : 26;
                        yesBtn.style.transform = `translateX(${shift}px) rotate(${rotate}deg) scale(1.03)`;
                        yesBtn.textContent = state.clickAttempts % 2 === 0 ? 'Still him' : 'Keep him';
                        if (state.clickAttempts === 4 || state.clickAttempts === 8) {
                            flashFakeAccept('Blanket theft review complete. Verdict: still hopelessly in love. Rechecking anyway.');
                        }
                        setMessage(state.clickAttempts > 5 ? 'Marriage audit suggests forgiveness is extremely likely.' : 'Domestic negotiations detected.');
                        if (state.clickAttempts >= 10) {
                            yesBtn.removeEventListener('pointerenter', tilt);
                            yesBtn.removeEventListener('touchstart', tilt);
                            yesBtn.style.transform = 'none';
                            yesBtn.textContent = 'Keep him';
                            setMessage('Compromise reached. Proceed.');
                        }
                    };
                    yesBtn.addEventListener('pointerenter', tilt);
                    yesBtn.addEventListener('touchstart', tilt, { passive: false });
                }
            },
            {
                badge: 'Final question',
                title: 'Last one: would you choose William all over again, every single time?',
                helper: 'This is the big finish. The app is already pretty sure, but it wants the official record.',
                note: 'Final answer. Maximum romance pressure.',
                yesLabel: 'Every time',
                noLabel: 'This seems rigged',
                setup: ({ yesBtn, noBtn, setMessage, flashFakeAccept }) => {
                    const finalChaos = (event) => {
                        event.preventDefault();
                        state.clickAttempts += 1;
                        const offset = state.clickAttempts % 2 === 0 ? 60 : -60;
                        yesBtn.style.transform = `translateY(-6px) translateX(${offset}px) rotate(${offset > 0 ? 6 : -6}deg)`;
                        noBtn.style.transform = `translateX(${-offset}px)`;
                        if (state.clickAttempts === 5 || state.clickAttempts === 10) {
                            flashFakeAccept('Official record accepted... revoked... accepted again... hold please.');
                        }
                        setMessage(state.clickAttempts > 6 ? 'Final review nearly complete. The app is being a menace on purpose.' : 'Final review in progress. Heart status appears extremely stable.');
                        if (state.clickAttempts >= 12) {
                            yesBtn.removeEventListener('pointerenter', finalChaos);
                            yesBtn.removeEventListener('touchstart', finalChaos);
                            yesBtn.style.transform = 'none';
                            noBtn.style.transform = 'none';
                            setMessage('Official record accepted. Proceed with romance.');
                        }
                    };
                    yesBtn.addEventListener('pointerenter', finalChaos);
                    yesBtn.addEventListener('touchstart', finalChaos, { passive: false });
                }
            }
        ];

        function spawnHearts() {
            for (let i = 0; i < 14; i += 1) {
                const heart = document.createElement('span');
                heart.className = 'heart';
                heart.textContent = ['❤', '♥', '♡'][i % 3];
                heart.style.left = `${Math.random() * 100}%`;
                heart.style.animationDuration = `${9 + Math.random() * 7}s`;
                heart.style.animationDelay = `${Math.random() * 5}s`;
                heart.style.fontSize = `${16 + Math.random() * 16}px`;
                hearts.appendChild(heart);
            }
        }

        function showToast(message, duration = 2100) {
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        function getProgressPercent() {
            return Math.round((state.currentPage / state.totalPages) * 100);
        }

        function renderIntro() {
            app.innerHTML = `
                <section class="card">
                    <div class="hero">
                        <span class="eyebrow">💌 Anniversary Experience</span>
                        <div class="hero-photo-wrap">
                            <figure class="hero-photo">
                                <img src="./assets/couple-photo.jpg" alt="William and Kristin smiling together on their wedding day">
                                <figcaption class="hero-photo-caption">A pretty strong opening argument, honestly.</figcaption>
                            </figure>
                        </div>
                        <div>
                            <h1>A tiny chaotic love test for Kristin</h1>
                            <p class="subtitle">Equal parts romance, teasing, and suspiciously official software. Built to end in one unavoidable truth.</p>
                        </div>
                    </div>
                    <div class="question-card">
                        <div class="question-badge">Before we begin</div>
                        <div class="question-text">This app contains four questions, one dramatic fake error, and a very predictable outcome.</div>
                        <p class="helper-text">If you are Kristin, please continue. If you are William, you probably already know how this ends.</p>
                    </div>
                    <div style="display:flex; justify-content:center; margin-top: 8px;">
                        <button class="btn-yes" id="startBtn">Start the test</button>
                    </div>
                    <p class="footer-note">Confetti budget: modest. Love level: excessive.</p>
                </section>
            `;

            document.getElementById('startBtn').addEventListener('click', () => {
                state.currentPage = 1;
                renderQuestion();
            });
        }

        function renderQuestion() {
            const page = pages[state.currentPage - 1];
            const progress = getProgressPercent();

            app.innerHTML = `
                <section class="card" id="card">
                    <div class="progress-wrap">
                        <span class="eyebrow">❤️ Marriage stability audit</span>
                        <div class="progress-meta">
                            <span>${page.badge}</span>
                            <span>${progress}% complete</span>
                        </div>
                        <div class="progress" aria-hidden="true">
                            <div class="progress-bar" style="width:${progress}%"></div>
                        </div>
                    </div>

                    <div class="hero">
                        <h1>Anniversary honesty checkpoint</h1>
                        <p class="subtitle">We just need a few emotionally significant confirmations before the celebration can begin.</p>
                    </div>

                    <div class="question-card">
                        <div class="question-badge">${page.badge}</div>
                        <div class="question-text">${page.title}</div>
                        <p class="helper-text">${page.helper}</p>
                        ${state.currentPage === 1 ? '<div class="hero-photo-wrap" style="margin-top: 4px;"><figure class="hero-photo" style="width:min(100%,220px); padding:10px;"><img src="./assets/couple-photo.jpg" alt="William and Kristin smiling together on their wedding day"><figcaption class="hero-photo-caption">Exhibit A.</figcaption></figure></div>' : ''}
                    </div>

                    <div>
                        <div class="btn-container" id="btnWrap">
                            <button class="btn-yes" id="yesBtn">${page.yesLabel}</button>
                            <button class="btn-no" id="noBtn">${page.noLabel}</button>
                        </div>
                        <div class="message-bar" id="messageBar">${page.note}</div>
                    </div>

                    <p class="footer-note">Built with tenderness, mischief, and absolutely no neutral outcomes.</p>
                </section>
            `;

            state.clickAttempts = 0;
            state.yesScale = 1;
            state.isSwapped = false;

            const card = document.getElementById('card');
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            const messageBar = document.getElementById('messageBar');

            const setMessage = (msg) => {
                messageBar.textContent = msg;
            };

            const flashFakeAccept = (msg = 'Accepted... wait, no. Rechecking.') => {
                yesBtn.classList.add('fake-disabled');
                noBtn.classList.add('ghosted');
                setMessage(msg);
                setTimeout(() => {
                    yesBtn.classList.remove('fake-disabled');
                    noBtn.classList.remove('ghosted');
                }, 420);
            };

            page.setup({ yesBtn, noBtn, card, setMessage, flashFakeAccept });

            yesBtn.addEventListener('click', () => {
                state.promptsCleared += 1;
                showToast(state.toasts[(state.currentPage - 1) % state.toasts.length]);
                setTimeout(() => {
                    if (state.currentPage >= state.totalPages) {
                        renderErrorScreen();
                    } else {
                        state.currentPage += 1;
                        renderQuestion();
                    }
                }, 850);
            });

            noBtn.addEventListener('click', () => {
                const lines = [
                    'The app has reviewed that answer and rejected it on romantic grounds.',
                    'Nice try. The committee remains unconvinced.',
                    'That button appears to be decorative only.',
                    'System override denied. Love is still winning.'
                ];
                showToast(lines[Math.floor(Math.random() * lines.length)], 2200);
            });
        }

        function renderErrorScreen() {
            app.innerHTML = `
                <section class="error-screen">
                    <div class="terminal-top">
                        <span class="terminal-dot red"></span>
                        <span class="terminal-dot yellow"></span>
                        <span class="terminal-dot green"></span>
                    </div>
                    <div class="error-label">Critical system error</div>
                    <h1 class="error-title">LOVE_LOCK_EXCEPTION</h1>
                    <p class="error-copy">
                        An unhandled exception occurred while evaluating the emotional status of <strong>Kristin Egbert</strong>.
                        The system attempted to locate uncertainty across six separate checkpoints and instead found a fully committed anniversary-grade bond.
                    </p>
                    <div class="error-highlight">STATUS: PERMANENTLY IN LOVE WITH WILLIAM EGBERT</div>
                    <p class="error-copy">
                        Recovery options are limited. Recommended action: accept the romance, celebrate the marriage, and open the anniversary card.
                    </p>
                    <div class="cta-link" id="overrideBtn">Run automated override and reveal card →</div>
                </section>
            `;

            document.getElementById('overrideBtn').addEventListener('click', renderFinalCard);
        }

        function renderFinalCard() {
            app.innerHTML = `
                <section class="final-card">
                    <span class="eyebrow">🥂 Happy Anniversary</span>
                    <div>
                        <h1 class="final-title">Happy Anniversary, Kristin ❤️</h1>
                        <p class="subtitle">
                            William was always going to win this little game. You confirmed it repeatedly, under emotional pressure, button chaos, and a highly unreliable software stack.
                        </p>
                    </div>

                    <div class="final-photo-wrap">
                        <figure class="final-photo">
                            <img src="./assets/wedding-photo.webp" alt="William and Kristin on their wedding day">
                            <figcaption class="photo-caption">The day this whole love story got official.</figcaption>
                        </figure>
                    </div>

                    <div>
                        <div class="progress-meta">
                            <span>Love meter</span>
                            <span>100% undeniable</span>
                        </div>
                        <div class="love-meter"><div class="love-meter-fill"></div></div>
                    </div>

                    <div class="memory-grid">
                        <div class="memory-chip">💞 Four questions<br>answered correctly</div>
                        <div class="memory-chip">😂 Mild chaos<br>successfully survived</div>
                        <div class="memory-chip">✨ Lifetime subscription<br>to loving William</div>
                    </div>

                    <p class="subtitle">
                        Here’s to more laughs, more memories, and many more years of picking each other, again and again.
                    </p>

                    <p class="signature">
                        With love,<br>
                        your very smug anniversary app
                    </p>
                </section>
            `;
            showToast('Override successful. Celebration mode unlocked.', 2600);
        }

        spawnHearts();
        renderIntro();
    </script>
</body>
</html>
